apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudhv-installer
  namespace: kube-system
  labels:
    app: cloudhv-installer
spec:
  selector:
    matchLabels:
      app: cloudhv-installer
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: cloudhv-installer
    spec:
      # Only run on the cloudhv worker nodepool
      nodeSelector:
        workload: cloudhv
      tolerations:
        - operator: "Exists"
      hostNetwork: true
      hostPID: true
      containers:
        - name: installer
          # Replace with your built installer image:
          #   docker build -t <registry>/cloudhv-installer:latest -f example/aks/installer/Dockerfile .
          #   docker push <registry>/cloudhv-installer:latest
          image: INSTALLER_IMAGE_PLACEHOLDER
          imagePullPolicy: Always
          securityContext:
            privileged: true
          volumeMounts:
            - name: host-root
              mountPath: /host
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
      volumes:
        - name: host-root
          hostPath:
            path: /
            type: Directory
