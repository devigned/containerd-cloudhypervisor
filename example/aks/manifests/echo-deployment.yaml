apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-cloudhv
  labels:
    app: echo-cloudhv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: echo-cloudhv
  template:
    metadata:
      labels:
        app: echo-cloudhv
    spec:
      runtimeClassName: cloudhv
      containers:
        - name: echo
          image: hashicorp/http-echo:latest
          args:
            - "-text=Hello from a Cloud Hypervisor microVM!"
            - "-listen=:8080"
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: echo-cloudhv
spec:
  type: LoadBalancer
  selector:
    app: echo-cloudhv
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
