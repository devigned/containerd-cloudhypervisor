apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: cloudhv
handler: cloudhv
overhead:
  podFixed:
    # VM overhead: cloud-hypervisor (~15 MB) + guest kernel (~10 MB) +
    # agent (~5 MB) + virtiofsd (~5 MB) + shim (~5 MB) ≈ 40 MB
    memory: "50Mi"
    cpu: "50m"
scheduling:
  nodeSelector:
    workload: cloudhv
